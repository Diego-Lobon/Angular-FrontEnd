<div
    class="border border-gray-300 rounded-2xl p-6 grid grid-rows-[1.5fr_0.5fr]"
>
    <img
        class="w-min m-auto"
        [src]="product.image"
        (error)="onImageError($event)"
    />
    <div class="flex flex-col gap-1.5">
        <span class="text-2xl text-gray-600">{{ product.name }}</span>
        <div class="flex gap-1 text-[1rem]">
            <span>{{ product.marca }}</span>
            <span>-</span>
            <span>{{ product.category }}</span>
        </div>
        <div class="flex justify-between mt-2">
            <p>{{ product.description }}</p>
        </div>
        <button class="flex justify-center items-center gap-1 text-lg mt-3 bg-black hover:bg-gray-500 active:bg-gray-500 text-white py-2 rounded-[0.4rem]">
            <mat-icon>add_shopping_cart</mat-icon>
            <span>Agregar al carrito</span>
        </button>
    </div>
</div>
