<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
    ```
    <div
        class="w-full max-w-md bg-white rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.08)] p-8"
    >
        <!-- LOGO -->
        <div class="flex justify-center mb-6">
            <img
                src="assets/logos/logo-isur.png"
                alt="Logo empresa"
                class="h-20 object-contain"
            />
        </div>

        <!-- TITULO -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Iniciar Sesión</h1>

            <p class="text-gray-500 mt-2">
                Ingresa tus credenciales para continuar
            </p>
        </div>

        <!-- FORM -->
        <div class="flex flex-col gap-4">
            <div>
                <label class="text-sm text-gray-600 mb-2 block">
                    Usuario
                </label>

                <input
                    type="text"
                    placeholder="Ingresa tu usuario"
                    [(ngModel)]="username"
                    class="w-full border border-gray-300 rounded-xl p-4 outline-none focus:border-red-500 focus:ring-2 focus:ring-red-100 transition"
                />
            </div>

            <div>
                <label class="text-sm text-gray-600 mb-2 block">
                    Contraseña
                </label>

                <input
                    type="password"
                    placeholder="Ingresa tu contraseña"
                    [(ngModel)]="password"
                    class="w-full border border-gray-300 rounded-xl p-4 outline-none focus:border-red-500 focus:ring-2 focus:ring-red-100 transition"
                />
            </div>

            <button
                (click)="login()"
                class="mt-3 bg-red-500 hover:bg-red-600 active:bg-red-700 text-white rounded-xl py-4 font-semibold transition cursor-pointer"
            >
                Iniciar Sesión
            </button>

            @if(errorMessage()){

            <div
                class="bg-red-50 border border-red-200 text-red-600 rounded-xl p-4 text-center"
            >
                Usuario o contraseña incorrectos
            </div>

            }
        </div>
    </div>
    ```
</div>
