<div
    class="bg-white rounded-xl border border-gray-200/80 shadow-sm p-4 flex flex-col gap-3"
>
    <div class="flex justify-between items-center text-xs">
        <span
            class="font-mono bg-gray-100 text-gray-600 px-2 py-0.5 rounded font-bold"
        >
            #{{ product.referencia_interna }}
        </span>
        <div class="text-gray-500 text-right">
            <span class="font-medium text-gray-700"
                >{{ product.categoria.nombre }}</span
            >
            <span class="text-gray-300 mx-1">•</span>
            <span>{{ product.marca.nombre }}</span>
        </div>
    </div>

    <div>
        <h3 class="text-sm font-bold text-gray-800 leading-snug">
            {{ product.nombre }}
        </h3>
    </div>

    <div
        class="grid grid-cols-3 gap-2 bg-gray-50 p-2.5 rounded-lg border border-gray-100 text-center"
    >
        <div>
            <p
                class="text-[10px] uppercase tracking-wider text-gray-400 font-medium"
            >
                Costo
            </p>
            <p class="text-xs font-semibold text-gray-600">
                S/ {{ product.costo }}
            </p>
        </div>
        <div>
            <p
                class="text-[10px] uppercase tracking-wider text-emerald-600 font-bold"
            >
                P. Venta S/
            </p>
            <p class="text-xs font-bold text-emerald-700">
                S/ {{ product.precio_venta_soles}}
            </p>
        </div>
        <div>
            <p
                class="text-[10px] uppercase tracking-wider text-blue-600 font-bold"
            >
                P. Venta $
            </p>
            <p class="text-xs font-bold text-blue-700">
                $ {{ product.precio_venta_dolares }}
            </p>
        </div>
    </div>

    <hr class="border-gray-100 my-1" />

    <div class="grid grid-cols-2 gap-2">
        <button
            type="button"
            class="flex items-center justify-center gap-1.5 bg-gray-900 text-white font-medium text-xs py-2 rounded-lg active:bg-gray-800 active:scale-[0.98] transition-all"
        >
            <mat-icon
                class="text-sm! w-4! h-4! flex items-center justify-center"
                >edit</mat-icon
            >
            Editar
        </button>

        <button
            type="button"
            class="flex items-center justify-center gap-1.5 bg-red-50 text-red-600 border border-red-100 font-medium text-xs py-2 rounded-lg active:bg-red-100 active:scale-[0.98] transition-all"
        >
            <mat-icon
                class="text-sm! w-4! h-4! flex items-center justify-center"
                >delete</mat-icon
            >
            Eliminar
        </button>
    </div>
</div>
