<div class="mt-16 px-4 py-6 bg-gray-50 min-h-screen">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-gray-800">Lista de Productos</h2>
            <span
                class="bg-black text-white text-xs font-semibold px-2.5 py-1 rounded-full"
            >
                {{ filteredProducts().length }} Productos
            </span>
        </div>
    </div>

    <div class="flex flex-col gap-3">
        <input
            type="text"
            placeholder="Buscar producto..."
            class="border p-4 rounded-4xl w-full text-[1rem] bg-white border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900"
            (input)="searchTerm.set($any($event.target).value); currentPage.set(1)"
        />
        <div class="flex flex-col sm:flex-row gap-2">
            <select
                class="border p-2 rounded w-full text-[0.9rem] border-gray-400 bg-white"
                (change)="selectedCategory.set($any($event.target).value); currentPage.set(1)"
            >
                <option value="">Todas las categorías</option>
                @for(category of categories(); track category.id){
                <option [value]="category.id">{{ category.nombre }}</option>
                }
            </select>

            <select
                class="border p-2 rounded w-full text-[0.9rem] border-gray-400 bg-white"
                (change)="selectedMarca.set($any($event.target).value); currentPage.set(1)"
            >
                <option value="">Todas las marcas</option>
                @for(marca of marcas(); track marca.id){
                <option [value]="marca.id">{{ marca.nombre }}</option>
                }
            </select>

            <div
                class="flex items-center gap-2 border border-gray-400 bg-white p-2 rounded-lg w-full sm:max-w-[180px]"
            >
                <span
                    class="text-xs font-bold text-gray-500 uppercase tracking-wider pl-1"
                    >Tipo de cambio</span
                >
                <input
                    type="number"
                    step="0.01"
                    #tcInput
                    [value]="tipoCambio()"
                    class="w-full text-right text-[0.9rem] font-bold text-blue-700 focus:outline-none"
                    placeholder="0.00"
                    (keyup.enter)="updateTipoCambio(tcInput.value)"
                />
                <button
                    type="button"
                    (click)="updateTipoCambio(tcInput.value)"
                    class="bg-gray-900 hover:bg-gray-800 text-white font-medium text-xs px-4 py-2 rounded-lg active:scale-[0.98] transition-all flex items-center justify-center gap-1 shrink-0 h-[42px] sm:h-auto shadow-sm"
                >
                    <mat-icon
                        class="text-sm! w-4! h-4! flex items-center justify-center"
                        >sync</mat-icon
                    >
                    Aplicar
                </button>
            </div>
        </div>
        <div class="flex justify-end mt-2">
            <button
                type="button"
                (click)="syncFilteredPricesToOdoo()"
                class="w-full sm:w-auto bg-emerald-700 hover:bg-emerald-600 text-white font-semibold text-xs px-5 py-3 rounded-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-md"
            >
                <mat-icon
                    class="text-sm! w-4! h-4! flex items-center justify-center"
                    >cloud_upload</mat-icon
                >
                Actualizar precios al Odoo ({{ filteredProducts().length }}
                filtrados)
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 py-4">
        @for(product of paginatedProducts(); track product.id) {
        <app-admin-product-card
            [product]="product"
            [tipoCambio]="tipoCambio()"
            [categoriesList]="categories()"
            [marcasList]="marcas()"
            (onSave)="saveProductChanges($event)"
        />
        } @if(filteredProducts().length === 0){
        <div class="text-center text-gray-500 text-xl col-span-full py-10">
            No se encontraron productos
        </div>
        }
    </div>

    @if(totalPages() > 1) {
    <div
        class="flex justify-center items-center gap-1 w-full max-w-lg mx-auto pb-12 px-4"
    >
        <button
            (click)="goToPage(currentPage() - 1)"
            [disabled]="currentPage() === 1"
            class="flex items-center justify-center min-w-10 h-10 rounded-lg border border-gray-300 disabled:opacity-30 disabled:hover:bg-transparent hover:bg-gray-100 transition-colors bg-white z-10"
        >
            <mat-icon>chevron_left</mat-icon>
        </button>

        <div
            class="flex items-center gap-1.5 overflow-x-auto px-2 py-1 scroll-smooth max-w-full mask-edges"
        >
            @for(page of pageNumbers(); track page) {
            <button
                (click)="goToPage(page)"
                [class]="currentPage() === page 
                        ? 'min-w-10 h-10 px-3 rounded-lg bg-black text-white font-medium shadow-sm shrink-0' 
                        : 'min-w-10 h-10 px-3 rounded-lg border border-gray-300 hover:bg-gray-100 transition-colors text-gray-700 bg-white shrink-0'"
            >
                {{ page }}
            </button>
            }
        </div>

        <button
            (click)="goToPage(currentPage() + 1)"
            [disabled]="currentPage() === totalPages()"
            class="flex items-center justify-center min-w-10 h-10 rounded-lg border border-gray-300 disabled:opacity-30 disabled:hover:bg-transparent hover:bg-gray-100 transition-colors bg-white z-10"
        >
            <mat-icon>chevron_right</mat-icon>
        </button>
    </div>
    }
</div>
