<div class="mt-16 px-4 py-6 bg-gray-50 min-h-screen">
    <!-- * Titulo y cantidad -->
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-gray-800">Lista de Productos</h2>
            <span
                class="bg-black text-white text-xs font-semibold px-2.5 py-1 rounded-full"
            >
                2 Productos
            </span>
        </div>
    </div>

    <!-- * Filtros del producto -->
    <div class="flex flex-col gap-3">
        <input
            type="text"
            placeholder="Buscar producto..."
            class="border p-4 rounded-4xl w-full text-[1rem] bg-white border-gray-400"
            (input)="searchTerm.set($any($event.target).value); currentPage.set(1)"
        />
        <div class="flex gap-2">
            <select
                class="border p-2 rounded w-full text-[0.9rem] border-gray-400 bg-white"
                (change)="selectedCategory.set($any($event.target).value); currentPage.set(1)"
            >
                <option value="">Todas las categorías</option>
                @for(category of categories(); track category.id){
                <option [value]="category.id">{{ category.nombre }}</option>
                }
            </select>
            <select
                class="border p-2 rounded w-full text-[0.9rem] border-gray-400 bg-white"
                (change)="selectedMarca.set($any($event.target).value); currentPage.set(1)"
            >
                <option value="">Todas las marcas</option>
                @for(marca of marcas(); track marca.id){
                <option [value]="marca.id">{{ marca.nombre }}</option>
                }
            </select>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 py-4">
        @for(product of paginatedProducts(); track product.id) {
        <app-admin-product-card [product]="product" />
        } @if(filteredProducts().length === 0){
        <div class="text-center text-gray-500 text-xl col-span-full py-10">
            No se encontraron productos
        </div>
        }
    </div>

    @if(totalPages() > 1) {
    <div
        class="flex justify-center items-center gap-1 w-full max-w-lg mx-auto pb-12 px-4"
    >
        <button
            (click)="goToPage(currentPage() - 1)"
            [disabled]="currentPage() === 1"
            class="flex items-center justify-center min-w-10 h-10 rounded-lg border border-gray-300 disabled:opacity-30 disabled:hover:bg-transparent hover:bg-gray-100 transition-colors bg-white z-10"
        >
            <mat-icon>chevron_left</mat-icon>
        </button>

        <div
            class="flex items-center gap-1.5 overflow-x-auto px-2 py-1 scroll-smooth max-w-full mask-edges"
        >
            @for(page of pageNumbers(); track page) {
            <button
                (click)="goToPage(page)"
                [class]="currentPage() === page 
                        ? 'min-w-10 h-10 px-3 rounded-lg bg-black text-white font-medium shadow-sm shrink-0' 
                        : 'min-w-10 h-10 px-3 rounded-lg border border-gray-300 hover:bg-gray-100 transition-colors text-gray-700 bg-white shrink-0'"
            >
                {{ page }}
            </button>
            }
        </div>

        <button
            (click)="goToPage(currentPage() + 1)"
            [disabled]="currentPage() === totalPages()"
            class="flex items-center justify-center min-w-10 h-10 rounded-lg border border-gray-300 disabled:opacity-30 disabled:hover:bg-transparent hover:bg-gray-100 transition-colors bg-white z-10"
        >
            <mat-icon>chevron_right</mat-icon>
        </button>
    </div>
    }
</div>
