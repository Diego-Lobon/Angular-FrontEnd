<div class="py-8 px-10 mt-20 rounded-2xl shadow-sm">
    <h1 class="text-3xl font-bold mb-2 text-center text-gray-800">
        Iniciar Sesion
    </h1>

    <div class="flex flex-col gap-4">
        <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1"
                >Nombre de Usuario</label
            >
            <input
                type="text"
                placeholder="Ej. djuan"
                [(ngModel)]="username"
                class="border border-gray-300 rounded-lg p-3 outline-none w-full focus:border-blue-600 text-sm"
            />
        </div>

        <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1"
                >Contraseña</label
            >
            <input
                type="password"
                placeholder="••••••••"
                [(ngModel)]="password"
                class="border border-gray-300 rounded-lg p-3 outline-none w-full focus:border-blue-600 text-sm"
            />
        </div>

        <button
            (click)="login()"
            class="bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg p-3 text-sm transition-colors mt-2"
        >
            Ingresar
        </button>

        @if(errorMessage()) {
        <div
            class="bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-200 text-center"
        >
            Usuario o contraseña incorrectos.
        </div>
        }
    </div>
</div>
