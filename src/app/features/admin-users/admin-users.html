<div class="mt-16 px-4 py-6 bg-gray-50 min-h-screen">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-gray-800">
                Usuarios del Sistema
            </h2>
            <span
                class="bg-black text-white text-xs font-semibold px-2.5 py-1 rounded-full"
            >
                2 Total
            </span>
        </div>

        <div class="flex flex-col gap-4">
            @for (usuario of usuariosPrueba; track usuario.id) {
            <div
                class="bg-white p-4 rounded-xl border border-gray-200/80 shadow-sm flex flex-col gap-4"
            >
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <mat-icon class="text-5xl! h-auto! w-auto!"> person</mat-icon>
                        <div>
                            <h3
                                class="text-sm font-semibold text-gray-800 leading-tight"
                            >
                                {{ usuario.nombre }}
                            </h3>
                            <p class="text-xs text-gray-500 mt-0.5">
                                {{ usuario?.email}}
                            </p>
                        </div>
                    </div>

                    <span
                        class="text-xs font-medium px-2.5 py-1 rounded-md"
                        [ngClass]="{
                                'bg-blue-50 text-blue-700 border border-blue-200': usuario.rol === 'Administrador',
                                'bg-purple-50 text-purple-700 border border-purple-200': usuario.rol === 'Editor'
                            }"
                    >
                        {{ usuario.rol }}
                    </span>
                </div>

                <hr class="border-gray-100" />

                <div class="grid grid-cols-2 gap-2">
                    <button
                        type="button"
                        class="flex items-center justify-center gap-2 bg-gray-100 text-gray-700 font-medium text-xs py-2.5 rounded-lg active:bg-gray-200 active:scale-[0.98] transition-all"
                    >
                        <mat-icon
                            class="text-sm! w-4! h-4! flex items-center justify-center"
                            >edit</mat-icon
                        >
                        Editar
                    </button>

                    <button
                        type="button"
                        class="flex items-center justify-center gap-2 bg-red-50 text-red-600 border border-red-100 font-medium text-xs py-2.5 rounded-lg active:bg-red-100 active:scale-[0.98] transition-all"
                    >
                        <mat-icon
                            class="text-sm! w-4! h-4! flex items-center justify-center"
                            >delete</mat-icon
                        >
                        Eliminar
                    </button>
                </div>
            </div>
            }
        </div>
    </div>
</div>
